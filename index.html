<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chintan Vaghela — Product builder.">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Chintan Vaghela</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
    FONTS:
    Dario Amodei's site uses Tiempos Text (serif) + Söhne (sans) — both are paid fonts.
    These are the closest freely available equivalents:
      - "Lora"        → stands in for Tiempos Text (warm editorial serif)
      - "DM Sans"     → stands in for Söhne (clean, slightly humanist grotesque)
    If you purchase Tiempos + Söhne licenses, swap the @font-face declarations in style.css.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===================== NAV ===================== -->
  <header class="nav">
    <div class="wrap nav-inner">
      <a href="/" class="nav-name">Chintan Vaghela</a>
      <nav aria-label="Main navigation">
        <ul class="nav-links">
          <li><a href="#projects">Projects</a></li>
          <li><a href="#thoughts">Thoughts</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">

      <!-- ===================== PROFILE ===================== -->
      <section class="profile" aria-label="Profile">
        <!--
          PROFILE PHOTO
          1. Save your photo as: assets/images/profile.jpg
          2. Remove the <div class="profile-photo-placeholder"> block below
          3. Uncomment the <img> tag
        -->
        <img src="assets/images/profile.png" alt="Photo of Chintan Vaghela" class="profile-photo">

        <h1 class="profile-name">Chintan Vaghela</h1>

        <p class="profile-bio">product builder</p>

        <!--
          SOCIAL LINKS — replace href="#" with your actual URLs
          e.g. href="https://x.com/yourhandle"
        -->
        <ul class="social-links" aria-label="Social profiles">
          <li>
            <a href="https://x.com/chintanjv" class="social-link" target="_blank" rel="noopener" aria-label="X">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
          </li>
          <li>
            <a href="https://www.linkedin.com/in/chintan-vaghela/" class="social-link" target="_blank" rel="noopener" aria-label="LinkedIn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
          </li>
          <li>
            <a href="https://github.com/chintanjv" class="social-link" target="_blank" rel="noopener" aria-label="GitHub">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            </a>
          </li>
        </ul>
      </section>

      <hr class="divider">

      <!-- ===================== PROJECTS ===================== -->
      <section class="section" id="projects" aria-label="Projects">
        <p class="section-label">Projects</p>
        <div id="projects-grid" class="projects-grid">
          <!-- Populated by main.js from data/projects.json -->
        </div>
        <div class="view-more-wrap" id="projects-more-wrap" style="display:none">
          <button class="view-more-btn" id="projects-toggle" aria-expanded="false">
            View more
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="overflow-panel" id="projects-overflow">
            <div id="projects-overflow-grid" class="projects-grid overflow-grid">
              <!-- Hidden items populated by main.js -->
            </div>
          </div>
        </div>
      </section>

      <hr class="divider">

      <!-- ===================== THOUGHTS ===================== -->
      <section class="section" id="thoughts" aria-label="Thoughts">
        <p class="section-label">Thoughts</p>
        <div id="thoughts-list" class="thought-list">
          <!-- Populated by main.js from data/thoughts.json -->
        </div>
        <div class="view-more-wrap" id="thoughts-more-wrap" style="display:none">
          <button class="view-more-btn" id="thoughts-toggle" aria-expanded="false">
            View more
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="overflow-panel" id="thoughts-overflow">
            <div id="thoughts-overflow-list" class="thought-list overflow-list">
              <!-- Hidden items populated by main.js -->
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <footer class="footer">
    <div class="wrap">
      <p>© <span id="year"></span> Chintan Vaghela</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
